<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350" width="400" height="350">
  <defs>
    <linearGradient id="grad1d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0.03" />
    </linearGradient>
    <linearGradient id="lineGradD" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0.12" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="175" r="160" fill="url(#grad1d)" />

  <!-- Connections Layer 1 → Layer 2 -->
  <g stroke="url(#lineGradD)" stroke-width="1.5" fill="none">
    <line x1="80" y1="70" x2="180" y2="55" />
    <line x1="80" y1="70" x2="180" y2="130" />
    <line x1="80" y1="70" x2="180" y2="205" />
    <line x1="80" y1="70" x2="180" y2="280" />
    <line x1="80" y1="145" x2="180" y2="55" />
    <line x1="80" y1="145" x2="180" y2="130" />
    <line x1="80" y1="145" x2="180" y2="205" />
    <line x1="80" y1="145" x2="180" y2="280" />
    <line x1="80" y1="220" x2="180" y2="55" />
    <line x1="80" y1="220" x2="180" y2="130" />
    <line x1="80" y1="220" x2="180" y2="205" />
    <line x1="80" y1="220" x2="180" y2="280" />
    <line x1="80" y1="295" x2="180" y2="55" />
    <line x1="80" y1="295" x2="180" y2="130" />
    <line x1="80" y1="295" x2="180" y2="205" />
    <line x1="80" y1="295" x2="180" y2="280" />
  </g>

  <!-- Connections Layer 2 → Layer 3 -->
  <g stroke="url(#lineGradD)" stroke-width="1.5" fill="none">
    <line x1="180" y1="55" x2="290" y2="100" />
    <line x1="180" y1="55" x2="290" y2="175" />
    <line x1="180" y1="55" x2="290" y2="250" />
    <line x1="180" y1="130" x2="290" y2="100" />
    <line x1="180" y1="130" x2="290" y2="175" />
    <line x1="180" y1="130" x2="290" y2="250" />
    <line x1="180" y1="205" x2="290" y2="100" />
    <line x1="180" y1="205" x2="290" y2="175" />
    <line x1="180" y1="205" x2="290" y2="250" />
    <line x1="180" y1="280" x2="290" y2="100" />
    <line x1="180" y1="280" x2="290" y2="175" />
    <line x1="180" y1="280" x2="290" y2="250" />
  </g>

  <!-- Layer 1 nodes -->
  <g>
    <circle cx="80" cy="70" r="16" fill="#60a5fa" opacity="0.9" />
    <circle cx="80" cy="145" r="16" fill="#60a5fa" opacity="0.75" />
    <circle cx="80" cy="220" r="16" fill="#60a5fa" opacity="0.85" />
    <circle cx="80" cy="295" r="16" fill="#60a5fa" opacity="0.7" />
  </g>

  <!-- Layer 2 nodes -->
  <g>
    <circle cx="180" cy="55" r="14" fill="#60a5fa" opacity="0.65" />
    <circle cx="180" cy="130" r="14" fill="#60a5fa" opacity="0.9" />
    <circle cx="180" cy="205" r="14" fill="#60a5fa" opacity="0.7" />
    <circle cx="180" cy="280" r="14" fill="#60a5fa" opacity="0.8" />
  </g>

  <!-- Layer 3 nodes -->
  <g>
    <circle cx="290" cy="100" r="18" fill="#60a5fa" opacity="0.85" />
    <circle cx="290" cy="175" r="18" fill="#60a5fa" opacity="0.95" />
    <circle cx="290" cy="250" r="18" fill="#60a5fa" opacity="0.75" />
  </g>

  <!-- Node inner highlights -->
  <g fill="white" opacity="0.2">
    <circle cx="76" cy="66" r="5" />
    <circle cx="76" cy="141" r="5" />
    <circle cx="76" cy="216" r="5" />
    <circle cx="76" cy="291" r="5" />
    <circle cx="176" cy="51" r="4" />
    <circle cx="176" cy="126" r="4" />
    <circle cx="176" cy="201" r="4" />
    <circle cx="176" cy="276" r="4" />
    <circle cx="286" cy="96" r="5" />
    <circle cx="286" cy="171" r="5" />
    <circle cx="286" cy="246" r="5" />
  </g>

  <!-- Layer labels -->
  <text x="80" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#60a5fa" opacity="0.5" font-weight="500">Input</text>
  <text x="180" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#60a5fa" opacity="0.5" font-weight="500">Hidden</text>
  <text x="290" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#60a5fa" opacity="0.5" font-weight="500">Output</text>
</svg>
