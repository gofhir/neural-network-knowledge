{{- $src := .Get "src" -}}
{{- $download := .Get "download" | default "" -}}
{{- $title := .Get "title" | default "Notebook" -}}
{{- $base := site.BaseURL | strings.TrimSuffix "/" -}}
<div class="notebook-viewer">
  <div class="notebook-toolbar">
    <span style="font-weight:600; font-size:0.9rem;">{{ $title }}</span>
    <div style="display:flex; gap:0.5rem;">
      {{- with $download }}
      <a href="{{ $base }}{{ . }}" download style="font-size:0.8rem; padding:0.25rem 0.75rem; background:#005a9c; color:white; border-radius:0.375rem; text-decoration:none;">Descargar .ipynb</a>
      {{- end }}
    </div>
  </div>
  <iframe src="{{ $base }}{{ $src }}" loading="lazy"></iframe>
</div>
